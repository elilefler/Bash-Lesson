#cloud-config
autoinstall:
  version: 1
  locale: en_US.UTF-8
  keyboard:
    layout: us
  timezone: UTC

  identity:
    hostname: bash-cyber-lab
    username: student
    # Password hash for placeholder only. Replace with your own hashed password.
    password: "$6$BAJpTOszbl0yq20i$KkbclIlJspAK7VNwym/hKd5I8TZJTgiYNMAv9XMgR5EgA1VePxn0N7sLTdMkasWomELQ7GX2R5ylm/H6yj.yP/"

  ssh:
    install-server: true
    allow-pw: true

  storage:
    layout:
      name: direct

  updates: all

  packages:
    - bash
    - coreutils
    - grep
    - sed
    - gawk
    - findutils
    - less
    - nano
    - git
    - curl

  late-commands:
    - curtin in-target --target=/target -- bash -c 'set -euo pipefail; URL="https://autodeploy.leflr.com/Bash-Lesson.tar.gz"; DEST="/home/student/bash-cyber-course"; TMP="/tmp/bash-course.tar.gz"; rm -rf "$DEST"; mkdir -p "$DEST"; curl -fsSL "$URL" -o "$TMP"; tar -xzf "$TMP" -C "$DEST"; chown -R student:student "$DEST"; chmod +x "$DEST/setup_bash_cyber_lab.sh"; su - student -c "cd \"$DEST\" && ./setup_bash_cyber_lab.sh"'

  user-data:
    disable_root: true
    package_update: true
    package_upgrade: true
